name: Main
run-name: Build & deploy 🚀
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_NAME: oslo

permissions:
  id-token: write # REQUIRED for OIDC
  contents: read

jobs:
  prepare:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.vars.outputs.project_name }}
    steps:
      - id: vars
        run: |
          echo "project_name=${{ env.PROJECT_NAME }}" >> "$GITHUB_OUTPUT"

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: make install-dev

      - name: Lint
        run: make lint

      - name: Coverage
        run: make coverage
      
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

  build-lambda-zip:
    runs-on: ubuntu-latest
    needs:
      - sonarqube
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Build lambda package
        run: |
          make build-lambda-package

      - name: Upload Lambda ZIP artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lambda-zip
          path: lambda.zip

  cfn-lint:
    name: CloudFormation Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Run cfn-lint
        run: make cfn-lint

  deploy-resource-group:
    name: Deploy Resource Group
    needs:
      - prepare
      - cfn-lint
    uses: mb-dot-dev/reusable-workflows/.github/workflows/deploy-cloudformation.yaml@main
    secrets: inherit
    with:
      stack-name: ${{ needs.prepare.outputs.project_name }}-resource-group
      template: aws/resource-group.yml
      project: ${{ needs.prepare.outputs.project_name }}
      parameter-overrides: >-
        ProjectName=${{ needs.prepare.outputs.project_name }}

  deploy-sqs:
    name: Deploy SQS Queue
    needs:
      - prepare
      - cfn-lint
    uses: mb-dot-dev/reusable-workflows/.github/workflows/deploy-cloudformation.yaml@main
    with:
      stack-name: ${{ needs.prepare.outputs.project_name }}-sqs
      template: aws/sqs.yml
      parameter-overrides: >-
        ProjectName=${{ needs.prepare.outputs.project_name }},
        QueueName=${{ needs.prepare.outputs.project_name }}-queue
      project: ${{ needs.prepare.outputs.project_name }}
    secrets: inherit

  deploy-iam-role:
    name: Deploy IAM Role
    needs:
      - prepare
      - cfn-lint
      - deploy-sqs
    uses: mb-dot-dev/reusable-workflows/.github/workflows/deploy-cloudformation.yaml@main
    with:
      stack-name: ${{ needs.prepare.outputs.project_name }}-iam-role
      template: aws/iam-role.yml
      parameter-overrides: >-
        ProjectName=${{ needs.prepare.outputs.project_name }},
        QueueArn=${{ fromJSON(needs.deploy-sqs.outputs.stack-outputs-json).QueueArn }},
        RoleName=${{ needs.prepare.outputs.project_name }}-lambda
      project: ${{ needs.prepare.outputs.project_name }}
    secrets: inherit
  
  deploy-sqs-queue-policy:
    name: Deploy SQS Queue Policy
    needs:
      - prepare
      - cfn-lint
      - deploy-sqs
      - deploy-iam-role
    uses: mb-dot-dev/reusable-workflows/.github/workflows/deploy-cloudformation.yaml@main
    with:
      stack-name: ${{ needs.prepare.outputs.project_name }}-sqs-policy
      template: aws/sqs-policy.yml
      parameter-overrides: >-
        QueueArn=${{ fromJSON(needs.deploy-sqs.outputs.stack-outputs-json).QueueArn }},
        QueueUrl=${{ fromJSON(needs.deploy-sqs.outputs.stack-outputs-json).QueueUrl }},
        RoleArn=${{ fromJSON(needs.deploy-iam-role.outputs.stack-outputs-json).LambdaExecutionRoleArn }}
      project: ${{ needs.prepare.outputs.project_name }}
    secrets: inherit

  deploy-lambda:
    name: Deploy Lambda
    runs-on: ubuntu-latest
    needs:
      - prepare
      - cfn-lint
      - build-lambda-zip
      - deploy-sqs
      - deploy-iam-role
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Download Lambda ZIP artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lambda-zip

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
        with:
          version: 1.161.0
          use-installer: true

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name ${{ needs.prepare.outputs.project_name }}-lambda \
            --parameter-overrides \
            ProjectName=${{ needs.prepare.outputs.project_name }} \
            FunctionName=${{ needs.prepare.outputs.project_name }} \
            LambdaExecutionRoleArn=${{ fromJSON(needs.deploy-iam-role.outputs.stack-outputs-json).LambdaExecutionRoleArn }} \
            QueueArn=${{ fromJSON(needs.deploy-sqs.outputs.stack-outputs-json).QueueArn }} \
            --tags Project=${{ needs.prepare.outputs.project_name }}